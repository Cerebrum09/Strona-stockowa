<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta
      name="description"
      content="Nie znaleziono wskazanej strony w Banku Stockowym."
    />
    <title>Nie znaleziono strony — Bank Stockowy</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="error-page">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="Bank Stockowy — strona główna">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Bank Stockowy</span>
        </a>
      </div>
    </header>

    <main class="error-main">
      <section class="container error-content" aria-labelledby="error-title">
        <div class="error-visual" aria-hidden="true">
          <span class="error-code">404</span>
          <span class="error-frame error-frame-one"></span>
          <span class="error-frame error-frame-two"></span>
        </div>

        <div class="error-message">
          <p class="eyebrow">Nie znaleziono strony</p>
          <h1 id="error-title">Ten kadr gdzieś nam zaginął</h1>
          <p>
            Adres może być nieprawidłowy albo strona została przeniesiona.
            Wróć na stronę główną i spróbuj znaleźć interesujący Cię materiał ponownie.
          </p>
          <a class="primary-link" href="index.html">Wróć na stronę główną</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <a class="brand brand-footer" href="index.html">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Bank Stockowy</span>
        </a>
        <p>Strona błędu 404</p>
      </div>
    </footer>
  </body>
</html>
